# Configuración para Raspberry Pi 5 - Modo Producción
# Uso: docker compose -f docker-compose.yaml -f docker-compose.rpi5.yml up

services:
  ffa-app:
    # Ejecutar como root para acceso a GPIO
    user: "0:0"
    environment:
      - DEV_MODE=false  # PRODUCCIÓN: usar hardware real (TLB_MODBUS, IOs)
    entrypoint: ["/bin/sh","-lc"]
    command: >
      'ln -sf /dev/gpiochip0 /dev/gpiochip4 &&
       exec python /app/main.py'
